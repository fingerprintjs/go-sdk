name: Bump Internal SDK Requires

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'go-sdk/v8 version to bump to (e.g. v8.5.0)'
        required: true
        type: string

jobs:
  bump-internal-sdk-requires:
    name: 'Bump internal go-sdk requirement'
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    env:
      VERSION: ${{ github.event.inputs.version || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Bump go-sdk requirement in dependent modules
        run: bin/bump-internal-sdk-requires.sh "${{ env.VERSION }}"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RUNNER_APP_ID }}
          private-key: ${{ secrets.RUNNER_APP_PRIVATE_KEY }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore: bump internal go-sdk requirement to ${{ env.VERSION }}'
          title: 'chore: bump internal go-sdk requirement to ${{ env.VERSION }}'
          branch: chore/bump-internal-sdk-v8
          base: main
          labels: automated
